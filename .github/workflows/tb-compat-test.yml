name: Thunderbird Compatibility Test

# Installs the extension into a real Thunderbird instance and verifies it loads
# without being disabled. Runs on PRs that touch the extension or manifest, on
# version-bump PRs from tb-version-check, and on-demand.

on:
  pull_request:
    paths:
      - "extension/**"
      - "package.json"
  push:
    branches:
      - "auto/bump-tb-*"
  workflow_dispatch:
    inputs:
      thunderbird_channel:
        description: "Thunderbird channel to test (stable, beta, or daily)"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - daily

permissions:
  contents: read

jobs:
  compat-test:
    name: TB compat (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - stable
          - beta
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Build extension
        run: bash scripts/build.sh

      - name: Install Thunderbird (${{ matrix.channel }})
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.channel }}" = "stable" ]; then
            # Use the official Mozilla APT repo for latest stable
            sudo install -d -m 0755 /etc/apt/keyrings
            wget -qO- https://packages.mozilla.org/apt/repo-signing-key.gpg \
              | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
            echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" \
              | sudo tee /etc/apt/sources.list.d/mozilla.list > /dev/null
            # Prefer Mozilla's packages over distro ones
            printf 'Package: *\nPin: origin packages.mozilla.org\nPin-Priority: 1000\n' \
              | sudo tee /etc/apt/preferences.d/mozilla > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq thunderbird
          elif [ "${{ matrix.channel }}" = "beta" ]; then
            # Beta is distributed as a tarball from Mozilla
            TB_JSON=$(curl -sf https://product-details.mozilla.org/1.0/thunderbird_versions.json)
            BETA_VER=$(echo "$TB_JSON" | jq -r '.LATEST_THUNDERBIRD_DEVEL_VERSION')
            BETA_MAJOR=$(echo "$BETA_VER" | cut -d. -f1)
            echo "Downloading Thunderbird Beta $BETA_VER"
            wget -q "https://download.mozilla.org/?product=thunderbird-${BETA_VER}-SSL&os=linux64&lang=en-US" -O thunderbird-beta.tar.xz \
              || wget -q "https://archive.mozilla.org/pub/thunderbird/releases/${BETA_VER}/linux-x86_64/en-US/thunderbird-${BETA_VER}.tar.bz2" -O thunderbird-beta.tar.xz
            mkdir -p /opt/thunderbird-beta
            tar -xf thunderbird-beta.tar.xz -C /opt/thunderbird-beta --strip-components=1 2>/dev/null \
              || tar -xjf thunderbird-beta.tar.xz -C /opt/thunderbird-beta --strip-components=1
            sudo ln -sf /opt/thunderbird-beta/thunderbird /usr/local/bin/thunderbird-beta
          fi

      - name: Get installed Thunderbird version
        id: tb_ver
        run: |
          if [ "${{ matrix.channel }}" = "beta" ]; then
            TB_BIN="thunderbird-beta"
          else
            TB_BIN="thunderbird"
          fi
          TB_VERSION=$($TB_BIN --version 2>/dev/null | grep -oP '[\d.]+[a-z0-9]*' | head -1) || TB_VERSION="unknown"
          echo "version=$TB_VERSION" >> "$GITHUB_OUTPUT"
          echo "tb_bin=$TB_BIN" >> "$GITHUB_OUTPUT"
          echo "Thunderbird ${{ matrix.channel }}: $TB_VERSION"

      - name: Create test profile with extension
        id: profile
        run: |
          PROFILE_DIR=$(mktemp -d)
          EXT_DIR="$PROFILE_DIR/extensions"
          mkdir -p "$EXT_DIR"

          # Install extension by placing xpi with the extension ID as filename
          cp dist/thunderbird-mcp.xpi "$EXT_DIR/thunderbird-mcp@tkasperczyk.dev.xpi"

          # Enable experiment APIs (required for this extension)
          cat > "$PROFILE_DIR/user.js" << 'PREFS'
          user_pref("extensions.experiments.enabled", true);
          user_pref("app.update.enabled", false);
          user_pref("toolkit.telemetry.reportingpolicy.firstRun", false);
          user_pref("datareporting.policy.dataSubmissionEnabled", false);
          PREFS

          echo "profile_dir=$PROFILE_DIR" >> "$GITHUB_OUTPUT"
          echo "Profile created at $PROFILE_DIR"

      - name: Launch Thunderbird and check extension status
        run: |
          TB_BIN="${{ steps.tb_ver.outputs.tb_bin }}"
          PROFILE_DIR="${{ steps.profile.outputs.profile_dir }}"

          # Install xvfb for headless display
          sudo apt-get install -y -qq xvfb

          # Launch TB briefly so it processes extensions.json
          timeout 30 xvfb-run --auto-servernum "$TB_BIN" \
            --profile "$PROFILE_DIR" \
            --headless \
            --no-remote \
            2>&1 &
          TB_PID=$!

          # Wait for extensions.json to be created (TB needs a few seconds)
          for i in $(seq 1 25); do
            if [ -f "$PROFILE_DIR/extensions.json" ]; then
              # Give it a moment to finish writing
              sleep 2
              break
            fi
            sleep 1
          done

          # Kill TB
          kill $TB_PID 2>/dev/null || true
          wait $TB_PID 2>/dev/null || true

      - name: Verify extension loaded successfully
        run: |
          PROFILE_DIR="${{ steps.profile.outputs.profile_dir }}"
          EXT_JSON="$PROFILE_DIR/extensions.json"

          if [ ! -f "$EXT_JSON" ]; then
            echo "::error::extensions.json was not created — Thunderbird may have failed to start"
            exit 1
          fi

          # Extract extension status
          node -e "
            const ext = require('$EXT_JSON');
            const mcp = ext.addons.find(a => a.id === 'thunderbird-mcp@tkasperczyk.dev');
            if (!mcp) {
              console.error('::error::Extension not found in extensions.json');
              process.exit(1);
            }

            console.log('Extension: ' + mcp.id);
            console.log('  version:      ' + mcp.version);
            console.log('  active:        ' + mcp.active);
            console.log('  userDisabled:  ' + mcp.userDisabled);
            console.log('  appDisabled:   ' + mcp.appDisabled);

            if (mcp.appDisabled) {
              console.error('::error::Extension is appDisabled — Thunderbird ${{ steps.tb_ver.outputs.version }} rejected it. Check strict_max_version and experiment_apis support.');
              process.exit(1);
            }
            if (!mcp.active) {
              console.error('::warning::Extension is not active (but not appDisabled). May need manual enable.');
            }
            console.log('Extension loaded successfully on Thunderbird ${{ steps.tb_ver.outputs.version }}');
          "

      - name: Check for XPCOM interface availability
        run: |
          PROFILE_DIR="${{ steps.profile.outputs.profile_dir }}"

          # List of critical XPCOM interfaces used by the extension
          cat > /tmp/check_interfaces.js << 'SCRIPT'
          // This list is extracted from extension/mcp_server/api.js
          const REQUIRED_INTERFACES = [
            "nsIAbCard",
            "nsIMsgAttachment",
            "nsIMsgCompDeliverMode",
            "nsIMsgCompFields",
            "nsIMsgCompFormat",
            "nsIMsgComposeParams",
            "nsIMsgComposeService",
            "nsIMsgCompType",
            "nsIMsgFilterService",
            "nsIMsgFolder",
            "nsIMsgSend",
          ];

          const REQUIRED_SERVICES = [
            "MailServices.accounts",
            "MailServices.ab",
            "MailServices.compose",
            "MailServices.copy",
            "MailServices.filters",
            "MailServices.folderLookup",
          ];

          console.log("Required XPCOM interfaces:");
          REQUIRED_INTERFACES.forEach(i => console.log("  - " + i));
          console.log("");
          console.log("Required MailServices:");
          REQUIRED_SERVICES.forEach(s => console.log("  - " + s));
          console.log("");
          console.log("Note: Full runtime validation requires Thunderbird context.");
          console.log("The extension loading check above confirms these are available.");
          SCRIPT

          node /tmp/check_interfaces.js

      - name: Cleanup
        if: always()
        run: rm -rf "${{ steps.profile.outputs.profile_dir }}"
