name: Thunderbird Compatibility Test

# Standalone compatibility smoke test: installs the extension into real
# Thunderbird (stable + beta) and verifies it loads without appDisabled.
#
# Runs on PRs that touch the extension, and on-demand. The scheduled
# tb-version-check workflow has its own built-in compat-test stage that
# runs before opening a bump PR.

on:
  pull_request:
    paths:
      - "extension/**"
      - "package.json"
      - "scripts/build.sh"
  workflow_dispatch:
    inputs:
      thunderbird_channel:
        description: "Channel to test (leave blank for both)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - stable
          - beta

permissions:
  contents: read

jobs:
  compat-test:
    name: TB compat (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Build extension
        run: bash scripts/build.sh

      - name: Install Thunderbird (${{ matrix.channel }})
        run: |
          sudo apt-get update -qq
          if [ "${{ matrix.channel }}" = "stable" ]; then
            sudo install -d -m 0755 /etc/apt/keyrings
            wget -qO- https://packages.mozilla.org/apt/repo-signing-key.gpg \
              | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
            echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" \
              | sudo tee /etc/apt/sources.list.d/mozilla.list > /dev/null
            printf 'Package: *\nPin: origin packages.mozilla.org\nPin-Priority: 1000\n' \
              | sudo tee /etc/apt/preferences.d/mozilla > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y -qq thunderbird
          elif [ "${{ matrix.channel }}" = "beta" ]; then
            TB_JSON=$(curl -sf https://product-details.mozilla.org/1.0/thunderbird_versions.json)
            BETA_VER=$(echo "$TB_JSON" | jq -r '.LATEST_THUNDERBIRD_DEVEL_VERSION')
            echo "Downloading Thunderbird Beta $BETA_VER"
            wget -q "https://download.mozilla.org/?product=thunderbird-${BETA_VER}-SSL&os=linux64&lang=en-US" -O thunderbird-beta.tar.xz \
              || wget -q "https://archive.mozilla.org/pub/thunderbird/releases/${BETA_VER}/linux-x86_64/en-US/thunderbird-${BETA_VER}.tar.bz2" -O thunderbird-beta.tar.xz
            mkdir -p /opt/thunderbird-beta
            tar -xf thunderbird-beta.tar.xz -C /opt/thunderbird-beta --strip-components=1 2>/dev/null \
              || tar -xjf thunderbird-beta.tar.xz -C /opt/thunderbird-beta --strip-components=1
            sudo ln -sf /opt/thunderbird-beta/thunderbird /usr/local/bin/thunderbird-beta
          fi

      - name: Get installed Thunderbird version
        id: tb_ver
        run: |
          if [ "${{ matrix.channel }}" = "beta" ]; then TB_BIN="thunderbird-beta"; else TB_BIN="thunderbird"; fi
          TB_VERSION=$($TB_BIN --version 2>/dev/null | grep -oP '[\d.]+[a-z0-9]*' | head -1) || TB_VERSION="unknown"
          echo "version=$TB_VERSION" >> "$GITHUB_OUTPUT"
          echo "tb_bin=$TB_BIN" >> "$GITHUB_OUTPUT"
          echo "Thunderbird ${{ matrix.channel }}: $TB_VERSION"

      - name: Create test profile with extension
        id: profile
        run: |
          PROFILE_DIR=$(mktemp -d)
          mkdir -p "$PROFILE_DIR/extensions"
          cp dist/thunderbird-mcp.xpi "$PROFILE_DIR/extensions/thunderbird-mcp@tkasperczyk.dev.xpi"
          cat > "$PROFILE_DIR/user.js" << 'PREFS'
          user_pref("extensions.experiments.enabled", true);
          user_pref("app.update.enabled", false);
          user_pref("toolkit.telemetry.reportingpolicy.firstRun", false);
          user_pref("datareporting.policy.dataSubmissionEnabled", false);
          PREFS
          echo "profile_dir=$PROFILE_DIR" >> "$GITHUB_OUTPUT"

      - name: Launch Thunderbird and check extension loading
        run: |
          sudo apt-get install -y -qq xvfb
          TB_BIN="${{ steps.tb_ver.outputs.tb_bin }}"
          PROFILE_DIR="${{ steps.profile.outputs.profile_dir }}"

          timeout 30 xvfb-run --auto-servernum "$TB_BIN" \
            --profile "$PROFILE_DIR" --headless --no-remote 2>&1 &
          TB_PID=$!

          for i in $(seq 1 25); do
            [ -f "$PROFILE_DIR/extensions.json" ] && { sleep 2; break; }
            sleep 1
          done
          kill $TB_PID 2>/dev/null || true
          wait $TB_PID 2>/dev/null || true

      - name: Verify extension loaded successfully
        run: |
          EXT_JSON="${{ steps.profile.outputs.profile_dir }}/extensions.json"
          TB_VERSION="${{ steps.tb_ver.outputs.version }}"

          if [ ! -f "$EXT_JSON" ]; then
            echo "::error::extensions.json not created — Thunderbird may have failed to start"
            exit 1
          fi

          node -e "
            const ext = require('$EXT_JSON');
            const mcp = ext.addons.find(a => a.id === 'thunderbird-mcp@tkasperczyk.dev');
            if (!mcp) { console.error('::error::Extension not found'); process.exit(1); }

            console.log('Extension: ' + mcp.id + ' v' + mcp.version);
            console.log('  active:       ' + mcp.active);
            console.log('  appDisabled:  ' + mcp.appDisabled);

            if (mcp.appDisabled) {
              console.error('::error::Extension is appDisabled on Thunderbird $TB_VERSION');
              process.exit(1);
            }
            console.log('Extension loaded OK on Thunderbird $TB_VERSION');
          "

      - name: Cleanup
        if: always()
        run: rm -rf "${{ steps.profile.outputs.profile_dir }}"
