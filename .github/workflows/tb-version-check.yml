name: Thunderbird Version Check

# Polls Mozilla's product-details API for new Thunderbird releases and opens a
# PR to bump strict_max_version in the extension manifest when the latest stable
# version exceeds the currently declared ceiling. Runs weekly and on-demand.

on:
  schedule:
    - cron: "23 8 * * 1" # Every Monday at 08:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest Thunderbird version
        id: tb
        run: |
          TB_JSON=$(curl -sf https://product-details.mozilla.org/1.0/thunderbird_versions.json)
          LATEST=$(echo "$TB_JSON" | jq -r '.LATEST_THUNDERBIRD_VERSION')
          BETA=$(echo "$TB_JSON" | jq -r '.LATEST_THUNDERBIRD_DEVEL_VERSION')
          LATEST_MAJOR=$(echo "$LATEST" | cut -d. -f1)

          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_major=$LATEST_MAJOR" >> "$GITHUB_OUTPUT"
          echo "beta=$BETA" >> "$GITHUB_OUTPUT"
          echo "Latest stable: $LATEST (major: $LATEST_MAJOR)"
          echo "Latest beta:   $BETA"

      - name: Read current strict_max_version
        id: manifest
        run: |
          MAX_VER=$(node -p "require('./extension/manifest.json').browser_specific_settings.gecko.strict_max_version")
          # Extract numeric part from e.g. "151.*"
          MAX_MAJOR=$(echo "$MAX_VER" | cut -d. -f1)

          echo "max_version=$MAX_VER" >> "$GITHUB_OUTPUT"
          echo "max_major=$MAX_MAJOR" >> "$GITHUB_OUTPUT"
          echo "Current strict_max_version: $MAX_VER (major: $MAX_MAJOR)"

      - name: Check if bump is needed
        id: check
        run: |
          LATEST_MAJOR=${{ steps.tb.outputs.latest_major }}
          MAX_MAJOR=${{ steps.manifest.outputs.max_major }}

          if [ "$LATEST_MAJOR" -gt "$MAX_MAJOR" ]; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
            echo "new_max=${LATEST_MAJOR}.*" >> "$GITHUB_OUTPUT"
            echo "::warning::Thunderbird ${{ steps.tb.outputs.latest }} is out, but strict_max_version is ${{ steps.manifest.outputs.max_version }}"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
            echo "Thunderbird ${{ steps.tb.outputs.latest }} is within strict_max_version ${{ steps.manifest.outputs.max_version }} — no bump needed."
          fi

      - name: Bump strict_max_version
        if: steps.check.outputs.needs_bump == 'true'
        run: |
          NEW_MAX="${{ steps.check.outputs.new_max }}"
          node -e "
            const fs = require('fs');
            const p = './extension/manifest.json';
            const m = JSON.parse(fs.readFileSync(p, 'utf8'));
            m.browser_specific_settings.gecko.strict_max_version = '$NEW_MAX';
            fs.writeFileSync(p, JSON.stringify(m, null, 2) + '\n');
          "
          echo "Bumped strict_max_version to $NEW_MAX"

      - name: Create pull request
        if: steps.check.outputs.needs_bump == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/bump-tb-${{ steps.tb.outputs.latest_major }}
          delete-branch: true
          title: "fix(compat): bump strict_max_version for Thunderbird ${{ steps.tb.outputs.latest }}"
          body: |
            ## Summary

            Thunderbird **${{ steps.tb.outputs.latest }}** has been released, but `strict_max_version` in `extension/manifest.json` is set to `${{ steps.manifest.outputs.max_version }}`.

            This PR bumps it to `${{ steps.check.outputs.new_max }}` so the extension is not marked `appDisabled` on the new version.

            **Source:** [Mozilla product-details API](https://product-details.mozilla.org/1.0/thunderbird_versions.json)

            ---
            *Auto-generated by the [tb-version-check](${{ github.server_url }}/${{ github.repository }}/actions/workflows/tb-version-check.yml) workflow.*
          commit-message: "fix(compat): bump strict_max_version to ${{ steps.check.outputs.new_max }} for Thunderbird ${{ steps.tb.outputs.latest }}"
          labels: compatibility
